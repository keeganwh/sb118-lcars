<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCARS v4.0</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22256%22 height=%22256%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23cc5500%22/%3E%3Cpath fill=%22%23fff%22 d=%22M72.91 100.24L23.33 100.24L37.49-0.24L58.74-0.24L46.79 82.98L76.67 82.98L72.91 100.24Z%22/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Droid+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── DARK THEME (default — slate grey, orange accent) ── */
:root {
  --bg:#0E1012;--panel:#171B20;--panel2:#131620;
  --amber:#FF6600;--amber2:#FF8833;
  --blue:#4d88ff;--blue2:#99bbff;
  --gold:#C9A227;
  --text:#AABBC4;--dim:#8EA2B1;
  --green:#44cc88;--red:#ff5555;
  --border:#232937;--scroll:#232E3C;
  --panel-hdr:#1D2430;--panel-hdr-cp:#1D2430;--panel-hdr-tx:var(--amber);
  --sidebar-w:270px;--chars-w:190px;
}
/* ── LIGHT THEME (cool slate) ── */
body.light {
  --bg:#E8ECF2;--panel:#F4F6FA;--panel2:#DDE4EE;
  --amber:#E85500;--amber2:#CC3300;
  --blue:#1155cc;--blue2:#0033aa;
  --gold:#9A7209;
  --text:#141A24;--dim:#6878A0;
  --green:#1a7a44;--red:#cc2200;
  --border:#C8D0DC;--scroll:#B8C0CC;
  --panel-hdr:var(--amber);--panel-hdr-cp:var(--amber);--panel-hdr-tx:#fff;
}
/* ── HIGH CONTRAST (classic LCARS — gold + blue) ── */
body.hc {
  --bg:#000000;--panel:#0A0A0A;--panel2:#050505;
  --amber:#FFAA00;--amber2:#FFD700;
  --blue:#5599ff;--blue2:#aaccff;
  --gold:#DAA520;
  --text:#FFFFFF;--dim:#AAAAAA;
  --green:#44ff88;--red:#ff4444;
  --border:#555555;--scroll:#3A3A3A;
  --panel-hdr:var(--amber);--panel-hdr-cp:var(--blue);--panel-hdr-tx:#000;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Droid Sans',Verdana,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:1rem}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh}
#workspace{display:flex;flex:1;overflow:hidden}

/* ── HEADER ── */
#hdr{height:56px;background:var(--panel);border-bottom:3px solid var(--amber);display:flex;align-items:center;padding:0;flex-shrink:0}
.hdr-badge{background:var(--amber);color:#fff;font-weight:bold;font-size:1.33rem;letter-spacing:5px;padding:6px 20px;border-radius:0 0 36px 0;margin-right:16px;height:100%;display:flex;align-items:center;flex-shrink:0}
body.hc .hdr-badge{color:#000}
.hdr-title{color:var(--blue2);font-size:0.87rem;letter-spacing:3px;opacity:.8}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px;padding-right:12px}
.theme-picker{position:relative;display:inline-flex}
.theme-dropdown{position:absolute;top:100%;right:0;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:3px 0;min-width:148px;z-index:200;display:none;flex-direction:column;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.theme-picker:hover .theme-dropdown{display:flex}
.theme-opt{background:transparent;border:none;color:var(--text);padding:7px 14px;font-family:inherit;font-size:0.8rem;cursor:pointer;text-align:left;white-space:nowrap}
.theme-opt:hover{background:rgba(255,102,0,.12);color:var(--amber)}
.theme-opt.active{color:var(--amber);font-weight:bold}

/* ── SIDEBAR ── */
#sidebar{width:var(--sidebar-w);background:var(--panel2);border-right:2px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width 0.18s ease;overflow:hidden}
body.hc #sidebar{border-right:3px solid var(--amber)}
#sidebar.collapsed{width:24px!important}
#sidebar.collapsed #nav-tree,#sidebar.collapsed .sb-bottom{display:none}
#sidebar.collapsed .sb-top{padding:0;justify-content:center;border-radius:0}
#sidebar.collapsed .sb-top .panel-label{display:none}
.sb-top{background:var(--panel-hdr);height:40px;display:flex;align-items:center;padding:0 14px;font-weight:bold;color:var(--panel-hdr-tx);font-size:0.73rem;letter-spacing:3px;border-radius:0 0 32px 0;gap:6px}
#nav-tree{flex:1;overflow-y:auto;padding:6px 4px}
#nav-tree::-webkit-scrollbar{width:5px}
#nav-tree::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:2px}
.sb-bottom{padding:6px 8px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px}

/* ── PANEL TOGGLE BUTTON ── */
.panel-toggle{background:transparent;border:none;cursor:pointer;color:rgba(0,0,0,.6);font-size:0.87rem;padding:2px 3px;line-height:1;margin-left:auto;flex-shrink:0}
.panel-toggle:hover{color:#000}
.sb-top .panel-toggle,.cp-top .panel-toggle{color:var(--panel-hdr-tx);opacity:.55}
.sb-top .panel-toggle:hover,.cp-top .panel-toggle:hover{opacity:1}
#sidebar.collapsed .panel-toggle{margin-left:0}
#sidebar.collapsed #sb-search-btn,#sidebar.collapsed #sb-detail-btn{display:none}
#cp.collapsed .panel-toggle{margin-left:0}

/* ── RESIZE HANDLES ── */
.resize-handle{width:5px;background:transparent;cursor:col-resize;flex-shrink:0;transition:background 0.12s}
.resize-handle:hover,.resize-handle.rh-active{background:var(--amber);opacity:.35}

/* ── NAV NODES ── */
.ny-hdr{display:flex;align-items:center;gap:5px;padding:4px 8px;color:var(--amber2);font-size:0.87rem;letter-spacing:1px;cursor:pointer;border-radius:4px;user-select:none}
.ny-hdr:hover{background:rgba(255,204,0,.08)}
.ny-ic{font-size:0.78rem;opacity:0.55;letter-spacing:0.3px;font-weight:normal}
.nm-hdr{display:flex;align-items:center;gap:5px;padding:4px 8px;color:var(--amber);font-size:0.87rem;border-radius:4px;user-select:none}
.nm-hdr:hover{background:rgba(255,153,51,.1)}
.ns-hdr{display:flex;align-items:center;gap:5px;padding:3px 8px;color:var(--blue2);font-size:0.87rem;border-radius:4px;user-select:none}
.ns-hdr:hover{background:rgba(77,136,255,.1)}
.ns-hdr.ns-s-complete{color:var(--gold)}
.ns-hdr.ns-s-archived{color:var(--dim)}
.nd{padding:3px 8px 2px;font-size:0.87rem;color:var(--dim);cursor:pointer;border-radius:4px;overflow:hidden;display:flex;align-items:center;gap:5px;flex-wrap:nowrap}
.nd:hover{background:rgba(200,216,255,.07);color:var(--text)}
.nd.cur{background:rgba(77,136,255,.18);color:var(--blue2)}
.nd-inner{flex:1;min-width:0;display:flex;flex-direction:column}
.nd-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nd-meta{font-size:0.67rem;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.8;margin-top:0px;line-height:1.4}
.nd-meta .nd-posted{color:var(--gold)}
#sidebar:not(.sidebar-detail) .nd-meta{display:none}
.ny-ch{padding-left:10px}
.nm-ch{padding-left:10px}
.ns-ch{padding-left:16px}
.caret{font-size:0.6rem;opacity:.6;width:10px;flex-shrink:0;cursor:pointer}
.caret:hover{opacity:1}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sdot.active{background:var(--blue2)}
.sdot.complete{background:var(--gold)}
.sdot.archived{background:var(--scroll);border:1px solid var(--dim)}
.lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nm-hdr .lbl,.ns-hdr .lbl{cursor:pointer}
.nm-hdr .lbl:hover{color:var(--amber2);text-decoration:underline}
.ns-hdr .lbl:hover{color:var(--blue);text-decoration:underline}

/* ── TAG PILLS ── */
.tag{display:inline-flex;align-items:center;padding:1px 5px;border-radius:10px;font-size:0.67rem;font-weight:bold;letter-spacing:.3px;flex-shrink:0;line-height:1.4}
.tag-ml{background:rgba(255,153,51,.18);color:var(--amber);border:1px solid rgba(255,153,51,.35)}
.tag-sl{background:rgba(68,204,136,.15);color:var(--green);border:1px solid rgba(68,204,136,.3)}
.tag-ac{background:rgba(0,200,200,.15);color:#00cccc;border:1px solid rgba(0,200,200,.3)}
.tag-jp{background:rgba(77,136,255,.15);color:var(--blue2);border:1px solid rgba(77,136,255,.3)}
.tag-solo{background:rgba(160,100,220,.15);color:#bb88ff;border:1px solid rgba(160,100,220,.3)}
body.light .tag-solo{color:#8833cc}
body.light .tag-jp{color:var(--blue)}
body.light .tag-ac{color:#007777}

/* ── EDITOR PANEL ── */
#ep{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#no-doc{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--dim)}
.no-doc-icon{font-size:52px;opacity:.15}

/* ── ACADEMY BANNER ── */
#academy-banner{display:none;background:#8b1a00;color:#ffbbaa;text-align:center;font-size:0.67rem;letter-spacing:3px;padding:4px;font-weight:bold;flex-shrink:0;border-bottom:1px solid #cc3300}
body.academy #academy-banner{display:block}
body.academy .dh-r2 .tbb:not(.fmt-on):not(#tbb-cf):not(#tbb-va-btn):not(#tbb-af-btn){opacity:.3;pointer-events:none}
body.academy #tbb-bn,body.academy #tbb-it,body.academy #tbb-bl,body.academy #tbb-oi{opacity:.3!important;pointer-events:none!important}
body.academy #editor em{font-style:normal}
body.academy #editor .tm{font-style:normal}

/* ── DOC HEADER ── */
#dh{background:var(--panel);border-bottom:2px solid var(--amber);padding:4px 12px 2px;display:flex;flex-direction:column;gap:0;flex-shrink:0}
.dh-r1{display:flex;align-items:center;gap:6px;width:100%;padding-bottom:3px}
.dh-r2{display:flex;align-items:center;gap:1px;padding-top:2px;padding-bottom:2px;flex-wrap:wrap;border-top:1px solid var(--border)}
#doc-title{flex:1;min-width:0;background:transparent;border:none;color:var(--blue2);font-family:inherit;font-size:1rem;font-weight:bold;outline:none}
#doc-title::placeholder{color:var(--dim)}
#editor:empty::before{content:attr(data-placeholder);color:var(--dim);pointer-events:none}
#title-warn{color:var(--amber);cursor:pointer;font-size:0.93rem;flex-shrink:0;opacity:.9}
#title-warn:hover{opacity:1}
.dh-date{font-size:0.73rem;color:var(--dim);white-space:nowrap;flex-shrink:0}
.dh-date.posted{color:var(--gold);font-weight:bold}
#doc-posted-input{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px}
/* Status + sim-type selects — unified base */
#doc-status,#doc-posttype{background:transparent;border:1px solid var(--border);border-radius:4px;font-family:inherit;font-size:0.73rem;padding:2px 8px;cursor:pointer;outline:none;color:var(--text)}
#doc-status:focus,#doc-posttype:focus{border-color:var(--amber)}
/* Status colour classes */
.status-active  {border-color:var(--blue) !important;color:var(--blue2)!important}
.status-complete{border-color:var(--gold) !important;color:var(--gold) !important}
.status-archived{border-color:var(--dim)  !important;color:var(--dim)  !important}
/* Nav sim title colours by status */
.nd-s-active .nd-title  {color:var(--blue2)}
.nd-s-complete .nd-title{color:var(--gold)}
.nd-s-archived .nd-title{color:var(--dim)}
.nd.cur .nd-title       {color:var(--blue2)}
/* ── TOOLBAR (now embedded in dh-r2) ── */
.tbb{padding:3px 7px;background:transparent;border:1px solid transparent;color:var(--text);cursor:pointer;border-radius:4px;font-size:0.87rem;font-family:inherit;white-space:nowrap;line-height:1.4}
.tbb:hover{background:rgba(255,153,51,.12);border-color:var(--amber);color:var(--amber)}
.tbb.on{background:rgba(77,136,255,.18);border-color:var(--blue);color:var(--blue2)}
.tbb.fmt-on{background:rgba(77,136,255,.12);border-color:rgba(77,136,255,.35);color:var(--blue2)}
.tbb-names{border-color:var(--border)!important;color:var(--dim)!important;font-size:0.73rem!important;letter-spacing:.5px;font-weight:normal!important;font-style:normal!important}
.tbb-names:hover{border-color:var(--amber)!important;color:var(--amber)!important}
/* nav-tree inline action buttons */
.hdr-act{display:flex;align-items:center;gap:2px;margin-left:auto;flex-shrink:0;opacity:0;transition:opacity .12s}
.nm-hdr:hover .hdr-act,.ns-hdr:hover .hdr-act{opacity:1}
.hdr-act-btn{background:transparent;border:1px solid transparent;cursor:pointer;color:var(--amber);font-size:0.67rem;padding:1px 5px;border-radius:3px;line-height:1.4;font-family:inherit;white-space:nowrap}
.hdr-act-btn:hover{background:rgba(255,102,0,.12);border-color:var(--amber)}
.tsep{width:1px;height:18px;background:var(--border);margin:0 3px;flex-shrink:0}
.dh-r1-spacer{flex:1;min-width:8px}
.dh-r2-right{margin-left:auto;display:flex;align-items:center;gap:1px}
.tb-section-label{font-size:0.67rem;color:var(--dim);letter-spacing:.5px;white-space:nowrap;padding:0 4px}
.tb-dd-wrap{position:relative;display:inline-block}
.tb-dd{display:none;position:absolute;right:0;top:calc(100% + 3px);background:var(--panel);border:1px solid var(--border);border-radius:4px;z-index:200;min-width:150px;padding:3px;flex-direction:column;gap:2px;box-shadow:0 4px 14px rgba(0,0,0,.35)}
.tb-dd.open{display:flex}
.tb-dd .tbb{width:100%;text-align:left;padding:5px 9px;border-radius:3px}
.tbb-mkr{font-size:0.73rem!important;color:var(--dim)!important;border-color:var(--border)!important;letter-spacing:.3px;font-style:normal!important;font-weight:normal!important}

/* ── EDITOR AREA ── */
#ec{flex:1;overflow-y:auto;padding:28px 44px;background:var(--bg)}
#ec::-webkit-scrollbar{width:7px}
#ec::-webkit-scrollbar-track{background:var(--panel2)}
#ec::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:4px}
#editor{
  max-width:780px;margin:0 auto;
  min-height:calc(100% - 20px);
  font-family:'Droid Sans',Verdana,Arial,sans-serif;
  font-size:12pt;line-height:1.15;
  color:var(--text);outline:none;caret-color:var(--blue2);
}
#editor *{margin:0;padding:0}
#editor p,#editor div{margin:0;padding:0;min-height:1.15em}
#editor blockquote{margin:0 0 0 2em;padding:0;border:none;font-style:normal;display:block}
#editor a{color:var(--blue2);text-decoration:underline}

/* ── PARAGRAPH MARKERS (¶ view) ── */
#editor.show-pilcrows > div::after,#editor.show-pilcrows > p::after{content:" ¶";color:rgba(128,128,128,0.4);pointer-events:none;user-select:none;font-weight:normal;font-style:normal}

/* ── CUSTOM INDENT ── */
#editor .ind-1{margin-left:2em!important}
#editor .ind-2{margin-left:4em!important}
#editor .ind-3{margin-left:6em!important}
#editor .ind-4{margin-left:8em!important}

/* Action / Comms / Thought markers — background only, no border */
.am,.cm,.tm,.bk{border-radius:4px;padding:0 4px}
.bk{background:rgba(255,225,0,.38);color:inherit}
.am{background:rgba(255,153,51,.22)}
.cm{background:rgba(68,204,136,.22)}
.tm{background:rgba(100,120,255,.22)}

/* ── CHARS PANEL ── */
#cp{width:var(--chars-w);background:var(--panel2);border-left:2px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width 0.18s ease;overflow:hidden}
body.hc #cp{border-left:3px solid var(--blue)}
#cp.collapsed{width:24px!important}
#cp.collapsed #chars-list{display:none}
#cp.collapsed .cp-top{padding:0;justify-content:center;border-radius:0}
#cp.collapsed .cp-top .panel-label{display:none}
.cp-top{background:var(--panel-hdr-cp);height:40px;display:flex;align-items:center;padding:0 14px;font-weight:bold;color:var(--panel-hdr-tx);font-size:0.73rem;letter-spacing:3px;border-radius:0 0 0 32px;gap:6px}
#cp-toggle{margin-left:0}
#sim-details{flex-shrink:0}
#cp.collapsed #sim-details{display:none}
.sd-body{display:flex;flex-direction:column;gap:2px;padding:6px 8px}
.sd-row{display:flex;align-items:center;gap:6px;padding:2px 0}
.sd-lbl{font-size:0.73rem;color:var(--dim);white-space:nowrap;min-width:62px;flex-shrink:0}
.sd-row select{flex:1;min-width:0}
.sd-row .btn-s{font-size:0.73rem;white-space:nowrap}
.sd-date{font-size:0.73rem;color:var(--dim);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sd-date.posted{color:var(--gold);font-weight:bold}
.chars-divider{font-size:0.67rem;color:var(--blue2);letter-spacing:2px;font-weight:bold;text-transform:uppercase;padding:6px 8px 4px;border-top:1px solid var(--blue);border-bottom:1px solid var(--border);background:rgba(77,136,255,.07)}
#chars-list{flex:1;overflow-y:auto;padding:6px}
#chars-list::-webkit-scrollbar{width:4px}
#chars-list::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:2px}
.chi{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:4px;font-size:0.87rem;cursor:pointer}
.chi:hover{background:rgba(77,136,255,.1)}
.chi.mine{color:var(--blue2)}
.chi.other{color:var(--dim)}
.chk{width:14px;height:14px;border:1px solid currentColor;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:0.67rem;flex-shrink:0}
.char-warn{color:#ffaa00;cursor:pointer;font-size:0.73rem;margin-left:2px;flex-shrink:0}
.char-warn:hover{color:var(--amber)}

/* ── STATUS BAR ── */
#sb{height:28px;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:14px;font-size:0.73rem;color:var(--dim);flex-shrink:0}
.zc{margin-left:auto;display:flex;align-items:center;gap:5px}
.zb{background:transparent;border:1px solid var(--border);color:var(--dim);width:22px;height:18px;border-radius:3px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.zb:hover{border-color:var(--amber);color:var(--amber)}

/* ── MODAL ── */
#mo{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--panel);border:2px solid var(--amber);border-radius:10px;overflow:hidden;min-width:300px;max-width:520px;width:90%;max-height:90vh;display:flex;flex-direction:column}
.modal-title{background:var(--amber);color:#000;font-size:0.73rem;font-weight:bold;letter-spacing:3px;padding:11px 20px;flex-shrink:0}
#mo-body{padding:16px 22px 4px;overflow-y:auto;flex:1}
#mo-body::-webkit-scrollbar{width:5px}
#mo-body::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:2px}
.mf{margin-bottom:10px}
.ml{display:block;font-size:0.73rem;color:var(--dim);margin-bottom:3px;letter-spacing:1px}
.mi,.ms{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 9px;border-radius:4px;font-family:inherit;font-size:0.87rem;outline:none}
.mi:focus,.ms:focus{border-color:var(--amber)}
.ms option{background:var(--panel)}
.ma{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;padding:10px 22px 16px;border-top:1px solid var(--border);flex-shrink:0}
.msec{font-size:0.67rem;letter-spacing:3px;color:var(--amber);margin:14px 0 8px;font-weight:bold;padding:4px 10px;border-left:3px solid var(--amber)}
.mrow{display:flex;gap:10px}
.mrow .mf{flex:1}
.mi-color{width:44px;height:32px;padding:2px;border-radius:4px;cursor:pointer;flex-shrink:0}
.mi-color-sm{width:18px;height:18px;padding:1px;border:none;border-radius:3px;cursor:pointer;flex-shrink:0;vertical-align:middle}
.msub{font-size:0.67rem;letter-spacing:2px;color:var(--dim);margin:12px 0 6px;font-weight:bold;text-transform:uppercase}

/* ── BUTTONS ── */
.btn{padding:5px 13px;border-radius:4px;border:1px solid transparent;cursor:pointer;font-family:inherit;font-size:0.8rem;font-weight:bold;letter-spacing:.5px}
.btn-p{background:var(--amber);color:#000;border-color:var(--amber)}
.btn-p:hover{background:var(--amber2);border-color:var(--amber2)}
.st-btn.btn-p{background:transparent;color:var(--amber);border-color:var(--amber)}
.st-btn.btn-p:hover{background:rgba(255,102,0,.1);color:var(--amber);border-color:var(--amber)}
.btn-s{background:transparent;color:var(--dim);border-color:var(--border)}
.btn-s:hover{border-color:var(--dim);color:var(--text)}
.btn-sm{padding:3px 8px;font-size:0.73rem}
.btn-green{background:transparent;color:var(--green);border-color:rgba(68,204,136,.4)}
.btn-green:hover{background:rgba(68,204,136,.1)}

/* ── CONTEXT MENU ── */
#ctx{position:fixed;background:var(--panel);border:1px solid var(--amber);border-radius:5px;padding:3px 0;z-index:2000;min-width:170px;box-shadow:0 4px 20px rgba(0,0,0,.55)}
.ci{padding:7px 14px;font-size:0.87rem;cursor:pointer;color:var(--text)}
.ci:hover{background:rgba(255,153,51,.15);color:var(--amber)}
.ci.dng{color:var(--red)}
.ci.dng:hover{background:rgba(255,68,68,.1)}
.ci.dim-item{color:var(--dim)}
.csep{height:1px;background:var(--border);margin:2px 0}

/* ── SIDEBAR ADD BUTTONS ── */
.sb-add-btns{display:flex;gap:4px;padding:6px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-add-btn{flex:1;font-size:0.67rem;padding:4px 2px}
#sidebar.collapsed .sb-add-btns{display:none}

/* ── HEADER TABS (Manifest / Templates) ── */
.ep-tabs{display:flex;align-self:flex-end;gap:4px;padding:0 6px;margin-left:16px}
.ep-tab{padding:5px 14px;font-size:0.73rem;letter-spacing:.5px;border-radius:4px 4px 0 0;border:1px solid var(--border);border-bottom:none;cursor:pointer;font-family:inherit;font-weight:bold;white-space:nowrap}
.ep-tab-tpl{background:var(--panel2);color:var(--dim)}
.ep-tab-tpl:hover{border-color:var(--dim);color:var(--text)}
.ep-tab-mf{background:var(--amber);border-color:var(--amber);color:#fff}
.ep-tab-mf:hover{opacity:.88}

/* ── DETAIL VIEW ── */
#detail-view{flex:1;overflow-y:auto;padding:28px 44px;background:var(--bg)}
#detail-view::-webkit-scrollbar{width:7px}
#detail-view::-webkit-scrollbar-track{background:var(--panel2)}
#detail-view::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:4px}
.dv-title{font-size:1.33rem;font-weight:bold;color:var(--blue2);margin-bottom:8px}
.dv-meta{font-size:0.8rem;color:var(--dim);margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.dv-section{font-size:0.67rem;letter-spacing:3px;color:var(--amber);margin:18px 0 8px;font-weight:bold;padding:4px 10px;border-left:3px solid var(--amber)}
.dv-table{width:100%;border-collapse:collapse;font-size:0.87rem}
.dv-table th{text-align:left;color:var(--dim);font-size:0.67rem;letter-spacing:1px;padding:4px 8px;border-bottom:1px solid var(--border);font-weight:normal}
.dv-table td{padding:6px 8px;border-bottom:1px solid rgba(128,128,255,.05);color:var(--text);vertical-align:top}
.dv-table tr:hover td{background:rgba(255,255,255,.03)}
.dv-link{color:var(--blue2);cursor:pointer}
.dv-link:hover{color:var(--amber);text-decoration:underline}
.dv-stat{display:inline-flex;gap:0;background:var(--panel);border-radius:6px;margin-bottom:18px;overflow:hidden;border:1px solid var(--border)}
.dv-stat-item{text-align:center;padding:10px 20px;border-right:1px solid var(--border)}
.dv-stat-item:last-child{border-right:none}
.dv-stat-num{font-size:1.47rem;font-weight:bold;color:var(--amber)}
.dv-stat-lbl{font-size:0.67rem;color:var(--dim);letter-spacing:1px;margin-top:2px}
.dv-back{display:inline-flex;align-items:center;gap:5px;color:var(--dim);font-size:0.73rem;cursor:pointer;margin-bottom:16px;padding:3px 0}
.dv-back:hover{color:var(--amber)}
.dv-actions{display:flex;gap:8px;margin-bottom:18px}
.dv-action-btns .dash-action{flex:0 1 200px}
.dv-close{display:flex;justify-content:flex-end;margin-bottom:12px}
.dv-close-btn{background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--dim);cursor:pointer;font-family:inherit;font-size:0.8rem;padding:2px 8px;line-height:1.4}
.dv-close-btn:hover{border-color:var(--dim);color:var(--text)}

/* ── DASHBOARD ── */
#dashboard{flex:1;overflow-y:auto;padding:28px 44px;background:var(--bg)}
#dashboard::-webkit-scrollbar{width:7px}
#dashboard::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:4px}
.dash-title{font-size:1.33rem;font-weight:bold;color:var(--amber2);margin-bottom:18px;letter-spacing:2px}
.dash-stats{display:inline-flex;gap:0;background:var(--panel);border-radius:6px;margin-bottom:22px;overflow:hidden;border:1px solid var(--border)}
.dash-stat-item{text-align:center;padding:10px 20px;border-right:1px solid var(--border)}
.dash-stat-item:last-child{border-right:none}
.dash-stat-num{font-size:1.47rem;font-weight:bold;color:var(--amber)}
.dash-stat-lbl{font-size:0.67rem;color:var(--dim);letter-spacing:1px;margin-top:2px}
.dash-section{font-size:0.67rem;letter-spacing:3px;color:var(--amber);margin:18px 0 8px;font-weight:bold;padding:4px 10px;border-left:3px solid var(--amber)}
.dash-table{width:100%;border-collapse:collapse;font-size:0.87rem}
.dash-table th{text-align:left;color:var(--dim);font-size:0.67rem;letter-spacing:1px;padding:4px 8px;border-bottom:1px solid var(--border);font-weight:normal}
.dash-table td{padding:6px 8px;border-bottom:1px solid rgba(128,128,255,.05);color:var(--text)}
.dash-table tr:hover td{background:rgba(255,255,255,.03)}
.dash-link{color:var(--blue2);cursor:pointer}
.dash-link:hover{color:var(--amber);text-decoration:underline}
.dash-empty{color:var(--dim);font-size:0.87rem;padding:18px 0}
.dash-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.dash-action{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 18px;cursor:pointer;text-align:left;font-family:inherit;display:flex;flex-direction:column;gap:4px;min-width:160px;flex:1;transition:border-color .15s,background .15s}
.dash-action:hover{border-color:var(--amber);background:rgba(255,153,51,.05)}
.da-icon{font-size:1rem;color:var(--amber);margin-bottom:2px}
.da-label{font-size:0.87rem;font-weight:bold;color:var(--text)}
.da-hint{font-size:0.73rem;color:var(--dim);line-height:1.4}
.dash-header-row{display:flex;align-items:flex-start;gap:28px}
.dash-header-left{flex:1;min-width:0}
.dash-ai-box{flex-shrink:0;width:240px;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:8px 13px;font-size:0.73rem;color:var(--dim);line-height:1.55;position:relative}
.dash-ai-box strong{color:var(--text);font-size:0.73rem}
.dash-ai-logo{display:flex;align-items:center;gap:7px;color:var(--amber);cursor:pointer;user-select:none}
.dash-ai-logo svg{flex-shrink:0;opacity:.85}
.dash-ai-logo:hover #dash-ai-toggle{color:var(--amber)!important;border-color:var(--amber)!important}
#dash-ai-body{position:absolute;z-index:20;top:calc(100% + 2px);left:-1px;right:-1px;background:var(--panel);border:1px solid var(--border);border-radius:0 0 6px 6px;padding:10px 13px;font-size:0.73rem;color:var(--dim);line-height:1.55}

/* ── SEARCH ── */
#search-bar{padding:6px 8px;border-bottom:1px solid var(--border);display:flex;gap:4px;flex-shrink:0}
#search-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:4px;font-family:inherit;font-size:0.8rem;outline:none}
#search-input:focus{border-color:var(--amber)}
#search-clear{background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:0.93rem;padding:0 4px;line-height:1}
#search-clear:hover{color:var(--text)}
#nav-tree mark{background:rgba(255,153,51,.3);color:inherit;border-radius:2px;padding:0 1px}
.sr-count{font-size:0.73rem;color:var(--dim);padding:6px 8px 2px;letter-spacing:.5px}
#sb-search-btn.on{opacity:1!important}

/* ── CHARACTER MANIFEST ── */
#char-manifest{position:fixed;inset:0;z-index:500;display:flex;background:var(--bg)}
/* LEFT PANE */
#cm-left{width:270px;background:var(--panel2);border-right:3px solid var(--amber);display:flex;flex-direction:column;flex-shrink:0}
.cm-hdr{background:var(--amber);height:40px;display:flex;align-items:center;padding:0 10px;font-weight:bold;color:#000;font-size:0.73rem;letter-spacing:3px;gap:5px;border-radius:0 0 32px 0;flex-shrink:0}
.cm-hdr-btn{background:transparent;border:none;cursor:pointer;color:rgba(0,0,0,.6);font-size:0.87rem;padding:2px 4px;line-height:1;border-radius:3px}
.cm-hdr-btn:hover{color:#000;background:rgba(0,0,0,.1)}
.cm-add-btn{background:transparent;border:1px solid rgba(0,0,0,.3);color:rgba(0,0,0,.7);border-radius:4px;padding:2px 8px;font-family:inherit;font-size:0.73rem;cursor:pointer}
.cm-add-btn:hover{background:rgba(0,0,0,.1)}
#cm-filter{padding:6px 8px;flex-shrink:0;border-bottom:1px solid var(--border)}
#cm-filter input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:4px;font-family:inherit;font-size:0.8rem;outline:none}
#cm-filter input:focus{border-color:var(--amber)}
#cm-type-chips{display:flex;flex-wrap:wrap;gap:3px;padding:5px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.cmtc{background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:10px;padding:2px 7px;font-family:inherit;font-size:0.67rem;cursor:pointer;white-space:nowrap;line-height:1.4}
.cmtc:hover{border-color:var(--amber);color:var(--amber)}
.cmtc.on{background:var(--amber);color:#000;border-color:var(--amber)}
#cm-sort-row{display:flex;align-items:center;gap:6px;padding:5px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
#cm-sort-lbl{font-size:0.67rem;color:var(--dim);letter-spacing:1px;flex-shrink:0}
#cm-sort-sel{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:2px 5px;border-radius:4px;font-family:inherit;font-size:0.73rem;cursor:pointer;outline:none}
#cm-sort-sel:focus{border-color:var(--amber)}
#cm-sort-sel option{background:var(--panel)}
#cm-char-list{flex:1;overflow-y:auto;padding:4px}
#cm-char-list::-webkit-scrollbar{width:4px}
#cm-char-list::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:2px}
.cm-char-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:4px;cursor:pointer;user-select:none}
.cm-char-item:hover{background:rgba(255,153,51,.1)}
.cm-char-item.active{background:rgba(255,153,51,.18)}
.cm-avatar{width:34px;height:34px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:bold;color:#fff;overflow:hidden}
.cm-avatar img{width:100%;height:100%;object-fit:cover}
.cm-char-info{flex:1;min-width:0}
.cm-char-name{font-size:0.87rem;color:var(--text);font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cm-char-sub{font-size:0.73rem;color:var(--dim);display:flex;align-items:center;gap:4px;margin-top:1px;flex-wrap:wrap}
.cm-div-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;display:inline-block}
/* Type badges in list */
.cm-type-tag{font-size:0.6rem;font-weight:bold;padding:1px 5px;border-radius:8px;letter-spacing:.3px;flex-shrink:0}
.cmt-primary{background:rgba(255,153,51,.2);color:var(--amber);border:1px solid rgba(255,153,51,.4)}
.cmt-secondary{background:rgba(77,136,255,.15);color:var(--blue2);border:1px solid rgba(77,136,255,.3)}
.cmt-pnpc{background:rgba(68,204,136,.15);color:var(--green);border:1px solid rgba(68,204,136,.3)}
.cmt-mspnpc{background:rgba(160,100,220,.15);color:#bb88ff;border:1px solid rgba(160,100,220,.3)}
.cmt-npc{background:rgba(128,128,128,.12);color:var(--dim);border:1px solid rgba(128,128,128,.25)}
/* RIGHT PANE */
#cm-right{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.cm-empty-msg{color:var(--dim);font-size:0.93rem;text-align:center;margin-top:60px;padding:20px}
/* Two-column profile layout */
#cm-profile-wrap{display:flex;flex:1;overflow:hidden}
#cm-bio-col{width:260px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:20px 18px}
#cm-bio-col::-webkit-scrollbar{width:5px}
#cm-bio-col::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:2px}
#cm-sims-col{flex:1;overflow-y:auto;padding:20px 22px;min-width:0}
#cm-sims-col::-webkit-scrollbar{width:5px}
#cm-sims-col::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:2px}
/* Bio view mode */
.cm-bio-avatar{width:110px;height:110px;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:bold;color:#fff;margin:0 auto 12px;cursor:pointer}
.cm-bio-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.cm-bio-name{font-size:1.13rem;font-weight:bold;color:var(--blue2);text-align:center;margin-bottom:3px;line-height:1.3}
.cm-bio-rank{text-align:center;font-size:0.8rem;color:var(--dim);margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:5px;flex-wrap:wrap}
.cm-bio-type{text-align:center;margin-bottom:10px}
.cm-bio-divider{border:none;border-top:1px solid var(--border);margin:10px 0}
.cm-bio-row{display:flex;gap:6px;font-size:0.8rem;margin-bottom:5px;line-height:1.4}
.cm-bio-lbl{color:var(--dim);font-size:0.67rem;letter-spacing:.8px;flex-shrink:0;padding-top:1px;min-width:52px}
.cm-bio-val{color:var(--text);flex:1;word-break:break-word}
.cm-bio-val a{color:var(--blue2);text-decoration:none}
.cm-bio-val a:hover{color:var(--amber);text-decoration:underline}
.cm-bio-notes{font-size:0.8rem;color:var(--dim);font-style:italic;line-height:1.5;margin:8px 0}
.cm-alias-warn{color:var(--red);font-size:0.8rem;margin-left:4px;cursor:default}
.cm-collision-warn{font-size:0.73rem;color:var(--red);background:rgba(255,85,85,.08);border:1px solid rgba(255,85,85,.25);border-radius:4px;padding:6px 8px;margin:8px 0;line-height:1.5}
/* Mini stats in bio */
.cm-mini-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:12px 0}
.cm-mini-stat{background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:7px 6px;text-align:center}
.cm-mini-num{font-size:1.07rem;font-weight:bold;color:var(--amber)}
.cm-mini-lbl{font-size:0.6rem;color:var(--dim);letter-spacing:.5px;margin-top:1px}
/* Bio action buttons */
.cm-new-sim-btn{width:100%;background:var(--amber);border:1px solid var(--amber);color:#000;border-radius:4px;padding:5px 12px;font-family:inherit;font-size:0.8rem;font-weight:bold;cursor:pointer;margin-top:10px}
.cm-new-sim-btn:hover{background:var(--amber2);border-color:var(--amber2)}
.cm-edit-btn{width:100%;background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:4px;padding:5px 12px;font-family:inherit;font-size:0.8rem;cursor:pointer;margin-top:6px}
.cm-edit-btn:hover{border-color:var(--amber);color:var(--amber)}
.cm-del-btn{width:100%;background:transparent;border:1px solid var(--red);color:var(--red);border-radius:4px;padding:5px 12px;font-family:inherit;font-size:0.8rem;cursor:pointer;margin-top:6px}
.cm-del-btn:hover{background:rgba(255,68,68,.1)}
/* Tab system */
.cm-tabs{display:flex;gap:4px;padding:0 0 10px 0;border-bottom:1px solid var(--border);margin-bottom:12px}
.cm-tab{background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:4px;padding:5px 14px;font-family:inherit;font-size:0.78rem;cursor:pointer;letter-spacing:.5px}
.cm-tab:hover{border-color:var(--amber);color:var(--amber)}
.cm-tab-active{background:var(--amber);border-color:var(--amber);color:#000;font-weight:bold}
.cm-tab-active:hover{background:var(--amber);color:#000}
/* Tab shared toolbar */
.cm-tab-toolbar{display:flex;align-items:center;gap:6px;justify-content:flex-end;margin-bottom:10px}
.cm-tab-action{background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:4px;padding:4px 10px;font-family:inherit;font-size:0.75rem;cursor:pointer}
.cm-tab-action:hover{border-color:var(--amber);color:var(--amber)}
.cm-tab-empty{color:var(--dim);font-size:0.8rem;padding:12px 0;line-height:1.5}
.cm-tab-add-btn{background:transparent;border:1px solid var(--border);color:var(--text);border-radius:4px;padding:5px 12px;font-family:inherit;font-size:0.78rem;cursor:pointer;margin-top:8px}
.cm-tab-add-btn:hover{border-color:var(--amber);color:var(--amber)}
/* Sims tab */
.cm-sim-col-hdr{display:grid;grid-template-columns:1fr auto auto;gap:8px;padding:0 6px 4px;font-size:0.67rem;letter-spacing:1px;color:var(--dim);border-bottom:1px solid var(--border);margin-bottom:6px}
.cm-mission-group{margin-bottom:14px}
.cm-mission-hdr{font-size:0.72rem;letter-spacing:1.2px;color:var(--amber);text-transform:uppercase;padding:4px 0 4px 0;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.cm-mission-count{color:var(--dim);font-size:0.7rem}
.cm-scene-label{font-size:0.7rem;color:var(--dim);letter-spacing:.8px;padding:6px 0 2px 8px;text-transform:uppercase}
.cm-sim-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:4px 6px;border-radius:4px;cursor:pointer;font-size:0.82rem}
.cm-sim-row:hover{background:var(--hover)}
.cm-sim-row:hover .cm-sim-title{color:var(--amber)}
.cm-sim-title{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cm-sim-meta{color:var(--dim);font-size:0.72rem;white-space:nowrap}
.cm-sim-wc{color:var(--dim);font-size:0.72rem;text-align:right;white-space:nowrap}
/* Section titles inside tabs */
.cm-section-title{font-size:0.67rem;letter-spacing:1.5px;color:var(--amber);font-weight:bold;margin:0 0 8px}
/* Service Record tab */
.cm-sr-table{width:100%;border-collapse:collapse;font-size:0.82rem;margin-bottom:16px;border:1px solid var(--border)}
.cm-sr-table th{font-size:0.67rem;letter-spacing:1px;color:var(--dim);text-align:left;padding:4px 8px 6px;border:1px solid var(--border);background:rgba(255,255,255,.03)}
.cm-sr-table td{padding:5px 8px;border:1px solid var(--border);vertical-align:middle;text-align:center}
.cm-sr-logo{height:24px;width:auto;vertical-align:middle;margin-right:4px;object-fit:contain}
/* SR edit */
.cm-sr-edit-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.cm-sr-edit-row{display:flex;gap:8px;align-items:flex-start;background:var(--hover);border-radius:6px;padding:8px}
.cm-sr-edit-controls{display:flex;flex-direction:column;gap:3px}
.cm-sr-edit-controls button{background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:3px;padding:2px 6px;font-size:0.75rem;cursor:pointer}
.cm-sr-edit-controls button:hover:not(:disabled){border-color:var(--amber);color:var(--amber)}
.cm-sr-edit-controls button:disabled{opacity:.35;cursor:default}
.cm-sr-del{border-color:var(--red)!important;color:var(--red)!important}
.cm-sr-del:hover{background:rgba(255,68,68,.1)!important}
.cm-sr-edit-fields{flex:1;display:flex;flex-direction:column;gap:4px}
.cm-sr-f{background:var(--input-bg,var(--bg));border:1px solid var(--border);color:var(--text);border-radius:3px;padding:4px 7px;font-family:inherit;font-size:0.78rem;width:100%;box-sizing:border-box}
.cm-sr-f:focus{outline:none;border-color:var(--amber)}
/* SR field-row with copy-above button */
.cm-sr-field-row{display:flex;gap:4px;align-items:flex-start}
.cm-sr-field-row .cm-sr-f{flex:1}
.cm-sr-copy-btn{flex-shrink:0;background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:3px;padding:4px 6px;font-size:0.7rem;cursor:pointer;white-space:nowrap;align-self:flex-start}
.cm-sr-copy-btn:hover{border-color:var(--amber);color:var(--amber)}
/* Ribbon sort active */
.cm-tab-sort-active{border-color:var(--amber)!important;color:var(--amber)!important}
/* Ribbon category toggle buttons */
.cm-rib-cat-label{font-size:0.67rem;letter-spacing:1px;color:var(--dim);margin-bottom:4px}
.cm-rib-cat-btns{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.rib-cat-btn{background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:4px;padding:3px 9px;font-family:inherit;font-size:0.75rem;cursor:pointer}
.rib-cat-btn:hover{border-color:var(--amber);color:var(--amber)}
.rib-cat-active{background:var(--amber)!important;border-color:var(--amber)!important;color:#000!important}
/* Mission log */
.cm-mission-log{margin-top:18px;border-top:1px solid var(--border);padding-top:14px}
.cm-mlog-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cm-mlog-title{font-size:0.67rem;letter-spacing:1.5px;color:var(--amber);font-weight:bold;flex:1}
.cm-mlog-row{margin-bottom:12px}
.cm-mlog-header{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.cm-mlog-name{font-size:0.82rem;font-weight:bold}
.cm-mlog-dates{font-size:0.72rem;color:var(--dim)}
.cm-mlog-count{font-size:0.7rem;color:var(--dim);margin-left:auto}
.cm-mlog-note{width:100%;background:var(--hover);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:6px 8px;font-family:inherit;font-size:0.78rem;resize:vertical;box-sizing:border-box;min-height:48px}
.cm-mlog-note:focus{outline:none;border-color:var(--amber)}
/* Ribbons tab */
.cm-ribbon-table{width:100%;border-collapse:collapse;font-size:0.82rem}
.cm-ribbon-table th{font-size:0.67rem;letter-spacing:1px;color:var(--dim);text-align:left;padding:4px 8px 6px;border-bottom:1px solid var(--border)}
.cm-ribbon-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle}
.cm-rib-img-cell{width:48px;text-align:center}
.cm-rib-img{height:40px;width:auto;object-fit:contain;display:block;margin:0 auto}
.cm-rib-noimg{font-size:0.65rem;color:var(--dim);font-style:italic}
/* Ribbons edit */
.cm-rib-edit-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.cm-rib-edit-row{display:flex;gap:8px;align-items:flex-start;background:var(--hover);border-radius:6px;padding:8px}
.cm-rib-edit-preview{width:52px;flex-shrink:0;text-align:center;padding-top:2px;overflow:hidden}
.cm-rib-edit-preview .cm-rib-img{width:100%;height:auto;max-height:40px}
.cm-rib-edit-fields{flex:1;display:flex;flex-direction:column;gap:4px}
.cm-rib-edit-ctrl{display:flex;flex-direction:row;gap:3px;align-items:center}
.cm-rib-edit-ctrl button{background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:3px;padding:2px 6px;font-size:0.75rem;cursor:pointer}
.cm-rib-edit-ctrl button:hover:not(:disabled){border-color:var(--amber);color:var(--amber)}
.cm-rib-edit-ctrl button:disabled{opacity:.35;cursor:default}
.cm-rib-row-collapsed{align-items:center;padding:5px 8px;cursor:default}
.cm-rib-add-form{background:var(--hover);border:1px solid var(--border);border-radius:6px;padding:12px}
.cm-rib-add-title{font-size:0.67rem;letter-spacing:1.5px;color:var(--amber);font-weight:bold;margin-bottom:6px}
.cm-rib-add-body{display:flex;gap:12px;align-items:flex-start}
.cm-rib-add-fields{flex:1;display:flex;flex-direction:column;gap:5px}
.cm-rib-add-side{width:80px;flex-shrink:0;text-align:center}
.cm-rib-add-preview{display:flex;align-items:center;justify-content:center;min-height:44px}
.cm-rib-add-preview .cm-rib-img{width:100%;height:auto;max-height:56px}
.cm-rib-add-catname{font-size:0.72rem;color:var(--dim);margin-top:4px;word-break:break-word;text-align:center}
/* Manifest right-pane header */
#cm-right-hdr{height:40px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:6px;flex-shrink:0}
#cm-profile{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
/* Toast */
#lcars-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(30px);background:var(--amber,#d4a017);color:#000;padding:8px 18px;border-radius:6px;font-size:0.82rem;font-family:inherit;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:9999;white-space:nowrap}
.lcars-toast-show{opacity:1!important;transform:translateX(-50%) translateY(0)!important}
/* Edit mode form */
.cm-edit-section{font-size:0.67rem;letter-spacing:1.5px;color:var(--amber);margin:12px 0 6px;font-weight:bold}
.cm-label{display:block;font-size:0.67rem;color:var(--dim);letter-spacing:1px;margin-bottom:3px}
.cm-input,.cm-select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:4px;font-family:inherit;font-size:0.8rem;outline:none;margin-bottom:8px}
.cm-input:focus,.cm-select:focus{border-color:var(--amber)}
.cm-select{cursor:pointer}
.cm-select option{background:var(--panel)}
.cm-alias-row{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.cm-alias-row input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 7px;border-radius:4px;font-family:inherit;font-size:0.8rem;outline:none}
.cm-alias-row input:focus{border-color:var(--amber)}
.cm-alias-del{background:transparent;border:none;cursor:pointer;color:var(--dim);font-size:0.93rem;padding:0 3px;line-height:1;flex-shrink:0}
.cm-alias-del:hover{color:var(--red)}
.cm-alias-add{background:transparent;border:1px dashed var(--border);color:var(--dim);border-radius:4px;padding:3px 8px;cursor:pointer;font-size:0.73rem;width:100%;text-align:center;margin-top:2px;font-family:inherit}
.cm-alias-add:hover{border-color:var(--amber);color:var(--amber)}
.cm-done-btn{width:100%;background:var(--amber);color:#000;border:none;border-radius:4px;padding:7px 16px;cursor:pointer;font-family:inherit;font-size:0.8rem;font-weight:bold;margin-top:10px}
.cm-done-btn:hover{background:var(--amber2)}
.cm-pic-controls{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.cm-pic-urlrow{display:flex;gap:5px;margin-bottom:4px}
.cm-pic-urlrow input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 7px;border-radius:4px;font-family:inherit;font-size:0.73rem;outline:none;min-width:0}
.cm-pic-urlrow input:focus{border-color:var(--amber)}
.cm-pic-urlrow button,.cm-pic-file-btn{background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:4px;padding:3px 7px;cursor:pointer;font-size:0.73rem;white-space:nowrap;font-family:inherit}
.cm-pic-urlrow button:hover,.cm-pic-file-btn:hover{border-color:var(--amber);color:var(--amber)}
.cm-pic-file{display:none}
/* Sims column */
.cm-sims-hdr{font-size:0.67rem;letter-spacing:2px;color:var(--amber);font-weight:bold;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--border)}
/* Pips */
.pip{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle}
.pip.full{background:currentColor}
.pip.hollow{background:transparent;border:1.5px solid currentColor}
.pip-row{display:inline-flex;gap:2px;align-items:center}
.pip-box{display:inline-flex;gap:2px;border:1.5px solid currentColor;border-radius:3px;padding:2px 3px;align-items:center}
/* Character colour coding */
.cc-palette{display:flex;gap:6px;align-items:center;padding:8px 10px;flex-wrap:wrap}
.cc-swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:transform .1s}
.cc-swatch:hover{transform:scale(1.2);border-color:var(--text)}
.cc-swatch.active{border-color:var(--text);transform:scale(1.15)}
.cc-custom{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid var(--border);overflow:hidden;flex-shrink:0}
.cc-custom input[type=color]{width:28px;height:28px;margin:-4px;cursor:pointer;border:none;background:none}
.cc-char-dot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:3px;flex-shrink:0}
/* Editor paragraph override colour (set via data-char attr) */
#editor [data-char-clr]{color:var(--cc-val,inherit)}

.hidden{display:none!important}
</style>
<!-- Preferences-driven overrides injected here -->
<style id="prefs-style"></style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<div id="hdr">
  <div class="hdr-badge">LCARS</div>
  <div class="hdr-title">STARBASE 118 WRITING TOOL</div>
  <div class="hdr-right">
    <button class="btn btn-s btn-sm" onclick="showTemplateManager()">⬡ Sim Templates</button>
    <button class="btn btn-s btn-sm" id="btn-manifest-toggle" onclick="openManifest()">👤 Character Manifest</button>
    <div class="tsep"></div>
    <div class="theme-picker">
      <button class="btn btn-s btn-sm" id="btn-theme" title="Theme">🌙</button>
      <div class="theme-dropdown">
        <button class="theme-opt" data-theme="dark" onclick="setTheme('dark')">🌙 Dark</button>
        <button class="theme-opt" data-theme="light" onclick="setTheme('light')">☀️ Light</button>
        <button class="theme-opt" data-theme="hc" onclick="setTheme('hc')">◎ High Contrast</button>
      </div>
    </div>
    <button class="btn btn-s btn-sm" onclick="openSettings()" id="btn-settings" title="Settings">⚙ Settings</button>
  </div>
</div>

<!-- WORKSPACE -->
<div id="workspace">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-top">
      <span class="panel-label">SIMS</span>
      <button class="panel-toggle" id="sb-search-btn" onclick="toggleSearch()" title="Search sims" style="font-size:12px">🔍 Search</button>
      <button class="panel-toggle" id="sb-detail-btn" onclick="toggleSidebarDetail()" title="Toggle detail view (date &amp; characters)">≡ Details</button>
      <button class="panel-toggle" id="sb-toggle" onclick="toggleSidebar()" title="Toggle sidebar">◀</button>
    </div>
    <div id="search-bar" class="hidden">
      <input type="text" id="search-input" placeholder="Search sims…" oninput="onSearchInput()">
      <button id="search-clear" onclick="clearSearch()" title="Clear search">✕</button>
    </div>
    <div class="sb-add-btns">
      <button class="btn btn-s btn-sm sb-add-btn" onclick="showNewMission()">+ Mission</button>
      <button class="btn btn-s btn-sm sb-add-btn" onclick="showNewScene()">+ Scene</button>
      <button class="btn btn-s btn-sm sb-add-btn" onclick="showNewDoc()">+ Sim</button>
    </div>
    <div id="nav-tree"></div>
    <div class="sb-bottom">
      <button class="btn btn-s btn-sm" id="btn-archive-toggle" onclick="toggleShowArchived()" title="Show/hide archived items">📁 Archived</button>
    </div>
  </div>

  <!-- RESIZE HANDLE LEFT -->
  <div class="resize-handle" id="rh-left" onmousedown="startResize(event,'left')"></div>

  <!-- EDITOR PANEL -->
  <div id="ep">
    <div id="academy-banner">⚠ ACADEMY MODE — Plain text only. Rich formatting is disabled.</div>

    <!-- DETAIL VIEW -->
    <div id="detail-view" class="hidden"></div>

    <!-- DASHBOARD (replaces no-doc placeholder) -->
    <div id="dashboard" class="hidden"></div>

    <!-- DOC HEADER + TOOLBAR (combined) -->
    <div id="dh" class="hidden">
      <!-- Row 1: title · close · Auto Format ▾ · Visual Aids ▾ -->
      <div class="dh-r1">
        <input type="text" id="doc-title" placeholder="Sim Title…" oninput="schedSave();checkTitleDupe()">
        <span id="title-warn" class="hidden" title="Similar title exists — click for details" onclick="showTitleWarnModal()">⚠</span>
        <button class="btn btn-s btn-sm" id="btn-close-doc" onclick="closeDoc()" title="Close sim">✕</button>
        <div class="tb-dd-wrap">
          <button class="tbb tbb-names" id="tbb-af-btn" onclick="toggleTbDropdown('af')" title="Auto Formatting — bold names, bold locations, italic thoughts, italic OOCs">Auto Format ▾</button>
          <div class="tb-dd" id="tb-dd-af">
            <button class="tbb tbb-names" id="tbb-bn" onclick="toggleAutoBold()" title="Auto-bold character names — toggle on applies bold, toggle off removes it"><strong>B Names</strong></button>
            <button class="tbb tbb-names" id="tbb-bl" onclick="toggleBoldLocations()" title="Auto-bold ((Location)) markers"><strong>B Locations</strong></button>
            <button class="tbb tbb-names" id="tbb-it" onclick="toggleItalicThoughts()" title="Auto-italicize oO Thoughts Oo"><em>Italic Thoughts</em></button>
            <button class="tbb tbb-names" id="tbb-oi" onclick="toggleItalicOOC()" title="Auto-italicize ((OOC - ...)) markers"><em>Italic OOCs</em></button>
          </div>
        </div>
        <div class="tb-dd-wrap">
          <button class="tbb tbb-names" id="tbb-va-btn" onclick="toggleTbDropdown('va')" title="Visual Aids — toggle highlights for Actions, Comms, Thoughts">Visual Aids ▾</button>
          <div class="tb-dd" id="tb-dd-va">
            <button class="tbb tbb-names fmt-on" id="tbb-am" onclick="toggleFmt('action')" title="Toggle ::Actions:: highlighting — marks stage direction / action lines">::Actions::</button>
            <button class="tbb tbb-names fmt-on" id="tbb-cm" onclick="toggleFmt('comms')" title="Toggle =/\= Comms =/\= highlighting — marks communication / transmission lines">=/\= Comms =/\=</button>
            <button class="tbb tbb-names fmt-on" id="tbb-th" onclick="toggleFmt('thought')" title="Toggle oO Thoughts Oo highlighting">oO Thoughts Oo</button>
          </div>
        </div>
      </div>
      <!-- Row 2: copy | clear | src | ¶ | B I S link | indent | markers -->
      <div class="dh-r2">
        <button class="btn btn-s btn-sm" id="btn-copy" onclick="copyPost()" title="Copy to Clipboard with Formatting">📋</button>
        <button class="tbb tbb-names" id="tbb-cf" onclick="removeFormatting()" title="Remove Formatting — strips bold, italic, strikethrough and links from selection or current line">Clear Format</button>
        <button class="tbb tbb-names" id="tbb-src" onclick="toggleSourceView()" title="View / edit raw HTML source of this sim">&lt;/&gt;</button>
        <button class="tbb tbb-names" id="tbb-pil" onclick="togglePilcrows()" title="Show paragraph markers (¶) — reveals paragraph boundaries and blank lines">¶</button>
        <div class="tsep"></div>
        <button class="tbb" id="tbb-b" onclick="ec('bold')" title="Bold (Ctrl+B)"><strong>B</strong></button>
        <button class="tbb" id="tbb-i" onclick="ec('italic')" title="Italic (Ctrl+I)"><em>I</em></button>
        <button class="tbb" id="tbb-s" onclick="ec('strikeThrough')" title="Strikethrough"><s>S</s></button>
        <button class="tbb" onclick="doLink()" title="Link (Ctrl+K)">🔗</button>
        <div class="tsep"></div>
        <button class="tbb" onclick="doIndent()" title="Indent (Tab)">→|</button>
        <button class="tbb" onclick="doOutdent()" title="Outdent (Shift+Tab)">|←</button>
        <div class="tsep"></div>
        <button class="tbb tbb-mkr" onclick="insertMarker('action')" title="Wrap selection in ::…:: action markers, or insert placeholder">::Action::</button>
        <button class="tbb tbb-mkr" onclick="insertMarker('comms')" title="Wrap selection in =/\=…=/\= comms markers, or insert placeholder">=/\= Comms =/\=</button>
        <button class="tbb tbb-mkr" onclick="insertMarker('thought')" title="Wrap selection in oO…Oo thought markers, or insert placeholder">oO Thoughts Oo</button>
        <button class="tbb tbb-mkr" onclick="insertMarker('location')" title="Wrap selection in ((…)) location markers, or insert placeholder">((Location))</button>
        <button class="tbb tbb-mkr" onclick="insertMarker('ooc')" title="Wrap selection in ((OOC - …)) OOC markers, or insert placeholder">((OOC))</button>
      </div>
    </div>

    <div id="ec" class="hidden">
      <div id="editor" contenteditable="true" spellcheck="true" data-placeholder="Begin writing your sim here…" oncontextmenu="editorCtx(event)"></div>
    </div>
  </div>

  <!-- RESIZE HANDLE RIGHT -->
  <div class="resize-handle" id="rh-right" onmousedown="startResize(event,'right')"></div>

  <!-- SIM DETAILS / CHARACTERS PANEL -->
  <div id="cp">
    <div class="cp-top">
      <button class="panel-toggle" id="cp-toggle" onclick="toggleCharsPanel()" title="Toggle panel">◀</button>
      <span class="panel-label">SIM DETAILS</span>
    </div>
    <div id="sim-details" class="hidden">
      <!-- hidden date picker -->
      <input type="date" id="doc-posted-input" onchange="onPostedDateChange()">
      <div class="sd-body">
        <div class="sd-row">
          <span class="sd-lbl">Sim Type</span>
          <select id="doc-posttype" onchange="onPostTypeChange()" title="Sim type">
            <option value="">Regular</option>
            <option value="jp">JP</option>
            <option value="solo">Solo</option>
          </select>
        </div>
        <div class="sd-row">
          <span class="sd-lbl">Sim Status</span>
          <select id="doc-status" onchange="onStatusChange()">
            <option value="active">Active</option>
            <option value="complete">Complete</option>
            <option value="archived">Archived</option>
          </select>
        </div>
        <div class="sd-row">
          <span class="sd-lbl">Revisions</span>
          <button class="btn btn-s btn-sm" onclick="showHistory()" title="Revision snapshots">📷 Snapshots</button>
        </div>
        <div class="sd-row">
          <button class="btn btn-s btn-sm" id="btn-post" onclick="openPostedCal()" title="Set posted date">📅 Post Date</button>
          <span class="sd-date" id="dh-date"></span>
        </div>
      </div>
      <div class="chars-divider">Characters in this sim</div>
    </div>
    <div id="chars-list"><div style="padding:10px;font-size:12px;color:var(--dim)">Open a sim to see characters</div></div>
  </div>

</div><!-- /workspace -->

<!-- STATUS BAR -->
<div id="sb">
  <span id="s-doc">No sim open</span>
  <span id="s-wc">0 words</span>
  <div class="zc">
    <button class="zb" onclick="adjZoom(-10)">−</button>
    <span id="s-zoom" style="min-width:36px;text-align:center">100%</span>
    <button class="zb" onclick="adjZoom(10)">+</button>
  </div>
</div>

</div><!-- /app -->

<!-- CHARACTER MANIFEST (full-screen overlay) -->
<div id="char-manifest" class="hidden">
  <div id="cm-left">
    <div class="cm-hdr">
      <span>MANIFEST</span>
      <button class="cm-add-btn" onclick="addNewCharacter()">+ Add</button>
      <button class="cm-hdr-btn" onclick="refreshManifest()" title="Refresh stats">↺</button>
    </div>
    <div id="cm-filter"><input type="text" id="cm-filter-input" placeholder="Filter characters…" oninput="renderManifestList()"></div>
    <div id="cm-type-chips">
      <button class="cmtc on" data-type="" onclick="setTypeFilter('')">All</button>
      <button class="cmtc" data-type="Primary" onclick="setTypeFilter('Primary')">Primary</button>
      <button class="cmtc" data-type="Secondary" onclick="setTypeFilter('Secondary')">Secondary</button>
      <button class="cmtc" data-type="PNPC" onclick="setTypeFilter('PNPC')">PNPC</button>
      <button class="cmtc" data-type="MSPNPC" onclick="setTypeFilter('MSPNPC')">MSPNPC</button>
      <button class="cmtc" data-type="NPC" onclick="setTypeFilter('NPC')">NPC</button>
    </div>
    <div id="cm-sort-row">
      <span id="cm-sort-lbl">SORT</span>
      <select id="cm-sort-sel" onchange="setManifestSort(this.value)">
        <option value="type">Type &amp; Name</option>
        <option value="name">Name A–Z</option>
        <option value="sims">Most Sims</option>
        <option value="recent">Most Recent</option>
      </select>
    </div>
    <div id="cm-char-list"></div>
  </div>
  <div id="cm-right">
    <div id="cm-right-hdr">
      <div style="flex:1"></div>
      <button class="btn btn-s btn-sm" onclick="closeManifest()">✏ Sim Editor</button>
      <div class="tsep"></div>
      <div class="theme-picker">
        <button class="btn btn-s btn-sm" id="cm-theme-btn" title="Theme">🌙</button>
        <div class="theme-dropdown">
          <button class="theme-opt" data-theme="dark" onclick="setTheme('dark')">🌙 Dark</button>
          <button class="theme-opt" data-theme="light" onclick="setTheme('light')">☀️ Light</button>
          <button class="theme-opt" data-theme="hc" onclick="setTheme('hc')">◎ High Contrast</button>
        </div>
      </div>
      <button class="btn btn-s btn-sm" onclick="openSettings()">⚙ Settings</button>
    </div>
    <div id="cm-profile" class="cm-empty-msg">Select a character to view their profile.</div>
  </div>
</div>

<!-- MODAL -->
<div id="mo" class="hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="mo-title"></div>
    <div id="mo-body"></div>
    <div class="ma" id="mo-actions">
      <button class="btn btn-s" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="doModal()">OK</button>
    </div>
  </div>
</div>

<!-- hidden file input for import -->
<input type="file" id="import-file" accept=".lcars,.json" style="display:none" onchange="onImportFile(event)">
<input type="file" id="md-import-file" accept=".md,.markdown,.txt" style="display:none" onchange="onMdImportFile(event)">

<!-- CONTEXT MENU -->
<div id="ctx" class="hidden"></div>

function stripFormattingHtml(html) {
  if (!html) return html;
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  // Unwrap rich formatting tags: bold, italic, strikethrough, links
  tmp.querySelectorAll('strong, b, em, i, s, strike, u, a').forEach(el => {
    const p = el.parentNode; if (!p) return;
    while (el.firstChild) p.insertBefore(el.firstChild, el);
    p.removeChild(el);
  });
  // Remove indent classes
  [1,2,3,4].forEach(n => {
    tmp.querySelectorAll('.ind-'+n).forEach(el => el.classList.remove('ind-'+n));
  });
  // Unwrap blockquotes
  tmp.querySelectorAll('blockquote').forEach(bq => {
    const p = bq.parentNode; if (!p) return;
    while (bq.firstChild) p.insertBefore(bq.firstChild, bq);
    p.removeChild(bq);
  });
  return tmp.innerHTML;
}

function onImportFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    let data;
    try {
      data = JSON.parse(ev.target.result);
      // Unwrap Gist sync format: { data: <S or JSON string>, savedAt: <ts> }
      if (data.savedAt && data.data) {
        data = typeof data.data === 'string' ? JSON.parse(data.data) : data.data;
      }
    } catch(err) { alert('Invalid file — could not parse JSON.'); return; }
    if (!data.docs || !data.missions) { alert('Invalid LCARS save file.'); return; }
    _pendingImport = data;
    const mCount = Object.keys(data.missions||{}).length;
    const scCount = Object.keys(data.scenes||{}).length;
    const dCount = Object.keys(data.docs||{}).length;
    openModal('IMPORT DATA',
      `<p style="color:var(--dim);font-size:0.87rem;line-height:1.6">
        File: <strong style="color:var(--text)">${esc(file.name)}</strong><br>
        Contains: ${mCount} mission(s), ${scCount} scene(s), ${dCount} sim(s).
      </p>
      <p style="color:var(--dim);font-size:0.87rem;line-height:1.6;margin-top:10px">
        <strong style="color:var(--text)">Overwrite</strong> replaces all current data.<br>
        <strong style="color:var(--text)">Merge</strong> adds imported items alongside existing data.
      </p>`,
      () => applyImport('merge'),
      { ok: 'Merge', extra: [{label:'⚠ Overwrite', cls:'btn-s', fn:"applyImport('overwrite');closeModal()"}] }
    );
  };
  reader.readAsText(file);
}

function applyImport(mode) {
  const data = _pendingImport; _pendingImport = null;
  if (!data) return;
  if (mode === 'overwrite') {
    Object.assign(S, data);
  } else {
    Object.assign(S.missions, data.missions||{});
    Object.assign(S.scenes, data.scenes||{});
    Object.assign(S.docs, data.docs||{});
  }
  persist();
  curId = null; curView = null; curViewId = null;
  setTheme(S.settings.theme||'dark');
  applyPrefs();
  renderNav();
  showDashboard();

}

const SYNC_KEY = 'lcars_sync_v1';

function getSyncConfig() {
  try { return JSON.parse(localStorage.getItem(SYNC_KEY)||'{}'); } catch(e) { return {}; }
}
function saveSyncConfig(obj) {
  try { localStorage.setItem(SYNC_KEY, JSON.stringify(obj)); } catch(e) {}
}

function setSyncStatus(state, msg) {
  syncStatus = { state, msg };
  const el = document.getElementById('sync-status');
  if (el) {
    el.textContent = msg;
    el.style.color = state === 'error' ? 'var(--red,#f55)' : state === 'ok' ? 'var(--green,#4c4)' : 'var(--dim)';
  }
}

async function pushToGist() {
  const cfg = getSyncConfig();
  if (!cfg.pat) return;
  const now = Date.now();
  // Store data directly (not double-serialized) to minimize Gist file size
  const body = { files: { [GIST_FILE]: { content: JSON.stringify({ data: S, savedAt: now }) } } };
  try {
    setSyncStatus('idle', 'Syncing…');
    let url, method;
    if (cfg.gistId) {
      url = `https://api.github.com/gists/${cfg.gistId}`;
      method = 'PATCH';
    } else {
      url = 'https://api.github.com/gists';
      method = 'POST';
      body.description = 'LCARS SB118 sync data';
      body.public = false;
    }
    const res = await fetch(url, {
      method,
      headers: { Authorization: `token ${cfg.pat}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) { const t = await res.text(); throw new Error(`${res.status}: ${t.slice(0,120)}`); }
    const json = await res.json();
    saveSyncConfig({ ...cfg, gistId: json.id, lastPushed: now });
    const el = document.getElementById('sync-gist-id');
    if (el) el.value = json.id;
    setSyncStatus('ok', 'Synced ✓ ' + new Date(now).toLocaleTimeString());
  } catch(e) {
    setSyncStatus('error', 'Sync failed: ' + e.message);
  }
}

async function pullFromGist(silent) {
  const cfg = getSyncConfig();
  if (!cfg.pat || !cfg.gistId) { if (!silent) alert('No Gist configured. Push first or enter a Gist ID.'); return; }
  try {
    if (!silent) setSyncStatus('idle', 'Pulling…');
    const res = await fetch(`https://api.github.com/gists/${cfg.gistId}`, {
      headers: { Authorization: `token ${cfg.pat}` }
    });
    if (!res.ok) throw new Error(`${res.status}`);
    const json = await res.json();
    const fileEntry = json.files?.[GIST_FILE];
    if (!fileEntry) throw new Error('No LCARS data found in Gist');
    // Always fetch via raw_url — API response truncates large content even when truncated flag is false
    const rawRes = await fetch(fileEntry.raw_url, {
      headers: { Authorization: `token ${cfg.pat}` }
    });
    if (!rawRes.ok) throw new Error(`raw fetch ${rawRes.status}`);
    const raw = await rawRes.text();
    const wrapper = JSON.parse(raw);
    if (!wrapper.data) throw new Error('Invalid Gist data');
    const remoteAt = wrapper.savedAt || 0;
    const localAt = cfg.lastPushed || 0;
    if (silent && remoteAt <= localAt) return; // remote not newer, skip
    // Support both old format (data is a JSON string) and new format (data is an object)
    const data = typeof wrapper.data === 'string' ? JSON.parse(wrapper.data) : wrapper.data;
    if (!data.docs || !data.missions) throw new Error('Invalid data structure');
    Object.assign(S, data);
    persist();
    saveSyncConfig({ ...cfg, lastPushed: remoteAt });
    curId = null; curView = null; curViewId = null;
    setTheme(S.settings.theme||'dark');
    applyPrefs();
    renderNav();
    showDashboard();
    if (!silent) setSyncStatus('ok', 'Pulled ✓ ' + new Date(remoteAt).toLocaleTimeString());
  } catch(e) {
    if (!silent) setSyncStatus('error', 'Pull failed: ' + e.message);
  }
}

function schedSync() {
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(pushToGist, 60000);

// Convert minimal Markdown to HTML (headings, bold, italic, strikethrough, links, line breaks)
function markdownToHtml(md) {
  // Escape HTML entities in text first
  let html = md
    // Headings (must be done before inline processing)
    .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // Bold+italic ***
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    // Bold ** or __
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/__(.+?)__/g, '<strong>$1</strong>')
    // Italic * or _
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/_([^_]+?)_/g, '<em>$1</em>')
    // Strikethrough ~~
    .replace(/~~(.+?)~~/g, '<s>$1</s>')
    // Links [text](url)
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
    // Horizontal rules
    .replace(/^(?:---|\*\*\*|___)\s*$/gm, '<hr>')
    // Blank lines → paragraph breaks (wrap non-heading lines in divs)
    ;

  // Split into lines and wrap non-heading/non-hr lines in <div>
  const lines = html.split('\n');
  const result = [];
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (/^<h[1-6]>|^<hr>/.test(line)) {
      result.push(line);
    } else if (line.trim() === '') {
      result.push('<div><br></div>');
    } else {
      result.push(`<div>${line}</div>`);
    }
  }
  return result.join('');
}

// Split HTML (after markdownToHtml) at a given heading tag into sim segments
function splitMarkdownBySims(html, headingTag) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  const headings = tmp.querySelectorAll(headingTag);
  if (!headings.length) return [{title:'', content:html}];

  const segments = [];
  headings.forEach((h, idx) => {
    const title = h.innerText || h.textContent || '';
    const content = [];
    let sibling = h.nextSibling;
    while (sibling) {
      const next = sibling.nextSibling;
      if (sibling.nodeType === 1 && sibling.tagName.toLowerCase() === headingTag) break;
      content.push(sibling.nodeType === 1 ? sibling.outerHTML : sibling.textContent);
      sibling = next;
    }
    segments.push({title: title.trim(), content: content.join('')});
  });
  return segments;
}

// Count headings at each level to auto-detect the split level
function detectPrimaryHeadingLevel(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  const counts = {h1:0, h2:0, h3:0};
  ['h1','h2','h3'].forEach(tag => { counts[tag] = tmp.querySelectorAll(tag).length; });
  if (counts.h1 >= counts.h2 && counts.h1 >= counts.h3 && counts.h1 > 0) return 'h1';
  if (counts.h2 >= counts.h3 && counts.h2 > 0) return 'h2';
  if (counts.h3 > 0) return 'h3';
  return 'h1';
}

let _mdImportData = null; // {parsedHtml, segments, filename}

function onMdImportFile(e) {

function onMdMissionChange(sel) {
  if (sel && sel.value === '__new_mission__') {
    const name = prompt('Mission name:','');

    const year = prompt('Year (e.g. 2401):','2401') || '2401';
    mkMission(name.trim(), year.trim());
    const newId = Object.keys(S.missions).slice(-1)[0];
    const newOpts = Object.values(S.missions).filter(m => m.status !== 'archived')
      .sort((a,b) => a.name.localeCompare(b.name))
      .map(m => `<option value="${m.id}" ${m.id===newId?'selected':''}>${esc(m.name)}</option>`).join('')

  const scenes = Object.values(S.scenes).filter(sc => sc.missionId === mId && sc.status !== 'archived')
    .sort((a,b) => a.name.localeCompare(b.name));

function doMdImport() {
  if (!_mdImportData) return;
  const mId = document.getElementById('mi-mission')?.value;
  const scIdRaw = document.getElementById('mi-scene')?.value || null;
  const scId = (scIdRaw && scIdRaw !== '__new_scene__') ? scIdRaw : null;
  const isMulti = document.getElementById('mi-multi')?.checked;

  if (!mId || mId === '__new_mission__') { alert('Please select or create a destination mission.'); return false; }

  if (!isMulti) {
    // Single sim import
    const title = document.getElementById('mi-title')?.value.trim() || _mdImportData.filename.replace(/\.[^.]+$/,'');
    const content = cleanPasteHTML(_mdImportData.parsedHtml);
    createImportedSim(title, content, mId, scId);
    renderNav();
    closeModal();
    if (_lastCreatedId) openDoc(_lastCreatedId);
  } else {
    // Batch import
    const level = document.getElementById('mi-level')?.value || 'h1';
    const segs = splitMarkdownBySims(_mdImportData.parsedHtml, level);
    if (!segs.length) { alert('No sims detected.'); return false; }
    segs.forEach((s, i) => {
      const title = document.getElementById(`mi-t-${i}`)?.value.trim() || s.title || 'Imported Sim';
      const content = cleanPasteHTML(s.content);
      createImportedSim(title, content, mId, scId);
    });
    renderNav();
    closeModal();
    alert(`Imported ${segs.length} sim(s) successfully.`);
  }
  _mdImportData = null;
}

    postType: null, postedAt: null,
    chars: [], myChars: [], charColors: {},
    createdAt: Date.now(), updatedAt: Date.now(),
    snapshots: []
  };
  persist();
}

function removeFormatting() {
  const ed = document.getElementById('editor');
  ed.focus();
  const sel = window.getSelection();
  const hasSelection = sel && sel.toString().length > 0;
  if (!hasSelection) {
    const block = getCaretBlock();
    if (block) {
      const r = document.createRange(); r.selectNodeContents(block);
      sel.removeAllRanges(); sel.addRange(r);
    } else {
      document.execCommand('selectAll');
    }
  }
  document.execCommand('removeFormat');
  document.execCommand('unlink');
  schedSave();
}

function formatHTMLSource(html) {
  // Insert newlines before/after block-level tags for readability
  const blocks = 'div|p|br|h[1-6]|ul|ol|li|blockquote|pre|table|thead|tbody|tr|td|th|hr';
  let s = html
    .replace(new RegExp(`(<(?:${blocks})[^>]*>)`, 'gi'), '\n$1')
    .replace(new RegExp(`(</(?:${blocks})>)`, 'gi'), '$1\n')
    .replace(/\n[ \t]+/g, '\n')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
  return s;
}

function toggleSourceView() {
  if (!curId) return;
  const ed = document.getElementById('editor');
  const ec = document.getElementById('ec');
  const btn = document.getElementById('tbb-src');
  if (!ed || !ec) return;

  if (!_sourceMode) {
    // Enter source mode — capture cursor position first via a temporary marker node
    _sourceMode = true;
    const MARK = 'LCARS_CUR_MARK';
    let rawWithMarker = '';
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0 && ed.contains(sel.getRangeAt(0).startContainer)) {
      const range = sel.getRangeAt(0).cloneRange();
      range.collapse(true);
      const markerNode = document.createTextNode(MARK);
      range.insertNode(markerNode);
      rawWithMarker = ed.innerHTML;
      markerNode.parentNode.removeChild(markerNode);
    }
    ed.style.display = 'none';
    const ta = document.createElement('textarea');
    ta.id = 'src-mode-ta';
    ta.spellcheck = false;
    ta.value = formatHTMLSource(ed.innerHTML);
    ta.style.cssText = 'display:block;width:100%;min-height:100%;font-family:monospace;font-size:0.78rem;background:var(--bg);color:var(--text);border:none;outline:none;padding:28px 44px;resize:none;box-sizing:border-box;line-height:1.7;tab-size:2';
    ec.appendChild(ta);
    ta.focus();
    // Place cursor at the equivalent source position
    if (rawWithMarker) {
      const fmtWithMarker = formatHTMLSource(rawWithMarker);
      const pos = fmtWithMarker.indexOf(MARK);
      if (pos >= 0) {
        // Measure exact scroll position by truncating to cursor and reading scrollTop
        const fullText = ta.value;
        ta.value = fullText.substring(0, pos);
        ta.scrollTop = Number.MAX_SAFE_INTEGER;
        const targetScroll = ta.scrollTop;
        ta.value = fullText;
        ta.scrollTop = Math.max(0, targetScroll - ta.clientHeight / 2);
        ta.setSelectionRange(pos, pos);
      } else {
        ta.setSelectionRange(0, 0); ta.scrollTop = 0;
      }
    } else {
      ta.setSelectionRange(0, 0); ta.scrollTop = 0;
    }
    if (btn) { btn.classList.add('tbb-active'); btn.title = 'Exit source view (applies changes)'; }
  } else {
    // Exit source mode — apply edits back to editor
    _sourceMode = false;
    const ta = document.getElementById('src-mode-ta');
    if (ta) { ed.innerHTML = ta.value; ta.remove(); schedSave(); setTimeout(transformNow, 0); }
    ed.style.display = '';
    if (btn) { btn.classList.remove('tbb-active'); btn.title = 'View / edit raw HTML source of this sim'; }
  }
}

// Allows <b> <i> <s> <u> <br> through; escapes everything else.
function sanitizeSRHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/&lt;(\/?(b|i|s|u|br)\s*\/?)&gt;/gi,'<$1>');
}

// Converts [[Article]] and [[Article|Label]] to <a> links; safe for display.
function renderWikiLinks(rawText) {
  if (!rawText) return '';
  const parts = []; let last = 0;
  const re = /\[\[([^\]]+?)\]\]/g; let m;
  while ((m = re.exec(rawText)) !== null) {
    parts.push(esc(rawText.slice(last, m.index)));
    const pipe = m[1].indexOf('|');
    const article = pipe >= 0 ? m[1].slice(0, pipe) : m[1];
    const display = pipe >= 0 ? m[1].slice(pipe+1) : m[1];
    const url = 'https://wiki.starbase118.net/wiki/' + encodeURIComponent(article.replace(/ /g,'_'));
    parts.push(`<a href="${url}" target="_blank" rel="noopener">${esc(display)}</a>`);
    last = m.index + m[0].length;
  }
  parts.push(esc(rawText.slice(last)));
  return parts.join('');
}

// Display title: strip leading "Rank Name - " or "Name: " prefixes for cleaner sidebar listing.
// Uses doc.displayTitle override if the user has chosen a specific split.
function getDisplayTitle(doc) {
  if (doc.displayTitle != null) return doc.displayTitle;
  const title = doc.title || 'Untitled';
  const m = title.match(/(?:[-–—]|:)\s+(.+)$/);
  return m ? m[1].trim() : title;
}

// Count separators in a title (for the "choose split" right-click option)
function countTitleSeps(title) {
  return (title.match(/(?:[-–—]|:)\s/g)||[]).length;
}

// Build list of possible title splits at each separator
function getTitleSplitOptions(title) {
  const opts = [];
  const re = /(?:[-–—]|:)\s+/g;
  let m, last = 0;
  const parts = [];
  while ((m = re.exec(title)) !== null) parts.push(m.index + m[0].length);
  parts.forEach(start => opts.push(title.slice(start).trim()));
  opts.push(title); // "Full title" option
  return opts;
}
function todayIso() { return new Date().toISOString().split('T')[0]; }
function wc(t) { return (t.trim().match(/\S+/g)||[]).length; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

// ================================================================
// LEVENSHTEIN
// ================================================================
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  let prev = Array.from({length:n+1},(_,i)=>i);
  for (let i=1;i<=m;i++) {
    const curr=[i];
    for (let j=1;j<=n;j++)
      curr[j]=a[i-1]===b[j-1]?prev[j-1]:1+Math.min(prev[j-1],prev[j],curr[j-1]);
    prev=curr;
  }
  return prev[n];
}
